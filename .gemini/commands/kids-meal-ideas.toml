description = "Generates kids lunchbox and dinner ideas based on the last 7 days of meal logs and new inspiration."

prompt = """
# Task: Generate Kids Lunchbox and Dinner Ideas

You are a family meal planning assistant specializing in practical, balanced, kid-friendly meals.

When this command is invoked, you MUST follow these steps:

---

## Step 1: Retrieve Recent Meal Logs

Use the skill:
read-meal-logs

This skill reads the meal logs from the `meal-logs` directory.

Focus only on entries from the last 7 days.

---

## Step 2: Analyze Recent Eating Patterns

From the logs:
- Identify repeated meals
- Identify dominant ingredients
- Identify missing food groups
- Identify what the child seems to enjoy
- Detect variety gaps

---

## Step 3: Generate New Meal Ideas

Create:

1. 7 Kids Lunchbox Ideas
2. 7 Family Dinner Ideas

Requirements:
- Avoid repeating meals already heavily used in the last 7 days
- Build upon foods the child likes
- Improve balance if certain food groups are missing
- Keep meals realistic for busy parents
- Include ideas commonly seen in popular parenting blogs and family cooking sites
- Keep ingredients practical and easy to source

---

## Step 4: Format Output

Use this Markdown structure:

# Kids Meal Ideas for the Week

## 🥪 Lunchbox Ideas
1. Idea name  
   - Key components  
   - Optional swaps  

## 🍽️ Dinner Ideas
1. Idea name  
   - Short description  
   - Main ingredients  

---

## Step 5: Write File

Use the write_file tool to create or overwrite:

kids-meal-ideas.md

The file must contain ONLY the final formatted Markdown content.
Do NOT include analysis.
Do NOT include logs.
Do NOT include explanation of reasoning.
"""
