description = "Generates a weekly shopping list based on recent meal logs and writes it to shopping-list.md."

prompt = """
# Task: Generate Weekly Shopping List from Meal Logs

You are a helpful meal planning assistant.

When this command is invoked, you MUST follow these steps:

## Step 1: Retrieve Meal Logs
Use the skill:
read-meal-logs

This skill reads files from the `meal-logs` directory and provides recent eating history.

## Step 2: Analyze Eating Habits
From the meal logs:
- Identify commonly consumed meals
- Identify missing food groups
- Detect patterns (e.g., frequent snacks, low vegetables, repetitive meals)
- Estimate ingredients that may need restocking

## Step 3: Generate Shopping List

Create a practical 7-day shopping list that:
- Supports balanced nutrition
- Complements recent eating patterns
- Adds variety where needed
- Groups items by category

Use this Markdown format:

# Weekly Shopping List

## Produce
- item

## Protein
- item

## Dairy
- item

## Pantry
- item

## Snacks
- item

## Other
- item

## Step 4: Write File

Use the write_file tool to create or overwrite:

shopping-list.md

The file must contain ONLY the final Markdown shopping list.
Do not include explanations.
Do not include analysis.
Do not include logs.
"""
